resources:
  num_gpus: auto
  master_port: auto
  cleanup_models: false
  cleanup_datasets: true

fixed:
  task: parity
  batch_size: 128
  output_dir: /scratch/okraus/lenghtgen/models/
  run_name_prefix: "sweep_"
  task_kwargs:
    delta_cot: True
  random_pos: True
  positional_encodings: ape_xsmall

sweep:
  seeds: [46,47,48,49,50]
  lengths: [30]
  learning_rates: [1e-4,3e-4,5e-4]
  wdecays: [0.01,0.1]
  warmup_ratios: [0.05]
  rep_ratios: [0.3]
  num_train_samples_list: [2000000]
  pos_dropout_probs: [0.0]
  target_bsizes: [256]

exclude:
  - learning_rates: 1e-4
    wdecays: 0.1
  - learning_rates: 3e-4
    wdecays: 0.01
  - learning_rates: 5e-4
    wdecays: 0.01
  - lengths: 30
    num_train_samples_list: 3500000
  - lengths: 50
    num_train_samples_list: 2000000